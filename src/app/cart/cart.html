<div class="cart-container">
  <table>
    <tr>
      <th>Sr No.</th>
      <th>Product Name</th>
      <th>Price</th>
    </tr>
    @for (product of productsInCart(); track product.id) {
      <tr>
        <td>{{$index + 1}}</td>
        <td>{{product.title}}</td>
        <td>{{product.price}}</td>
      </tr>
    }
    <tr>
      <th colspan="2">Total Price</th>
      <td style="color: darkgreen;">{{totalPrice()}}</td>
    </tr>
  </table>
</div>
